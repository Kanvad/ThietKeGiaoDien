<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - TechLap</title>
  <link rel="stylesheet" href="Styles/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <h1><a href="index.html">TechLap</a></h1>
      <nav class="top-nav">
        <a href="index.html">Trang chủ</a>
        <a href="login.html">Đăng nhập</a>
        <a class="active" href="signup.html">Đăng ký</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-card">
      <h2>Đăng ký</h2>
      <p class="form-note">Tạo tài khoản để mua hàng nhanh hơn.</p>
      <form>
        <label>Họ và tên</label>
        <input type="text" placeholder="Nguyễn Văn A">
        <label>Email</label>
        <input type="email" placeholder="nhap@email.com">
        <label>Mật khẩu</label>
        <input type="password" placeholder="Tạo mật khẩu">
        <button type="submit">Đăng ký</button>
      </form>
      <p class="form-switch">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
    </section>
  </main>
</body>
</html>
