<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên</title>
</head>
<body bgcolor="#f4f4f4">

    <div align="center">
        <p><b><font size="6" color="black">ĐĂNG KÝ THÀNH VIÊN</font></b></p>

        <form action="#" name="dangky" method="post">
            
            <div style="width: 600px;" align="left">

                <fieldset>
                    <legend><b>Thông tin cá nhân</b></legend>
                    
                    <table width="100%" border="0" cellspacing="0" cellpadding="8">
                        <tr>
                            <td width="150">Họ và tên:</td>
                            <td><input type="text" name="txtHoTen" size="30"></td>
                        </tr>
                        <tr>
                            <td>Ngày sinh:</td>
                            <td>
                                Ngày:
                                <select name="Ngay">
                                    <option value="01" selected>01</option>
                                    <option value="02">02</option>
                                    <option value="03">03</option>
                                    <option value="04">04</option>
                                    <option value="05">05</option>
                                    <option value="31">31</option>
                                </select>

                                Tháng:
                                <select name="Thang">
                                    <option value="01" selected>01</option>
                                    <option value="02">02</option>
                                    <option value="03">03</option>
                                    <option value="12">12</option>
                                </select>

                                Năm: <input type="text" name="txtNamSinh" size="4">
                            </td>
                        </tr>
                        <tr>
                            <td>Giới tính:</td>
                            <td>
                                <input type="radio" name="radGioiTinh" value="Nam" checked> Nam
                                <input type="radio" name="radGioiTinh" value="Nữ"> Nữ
                            </td>
                        </tr>
                        <tr>
                            <td valign="top">Địa chỉ:</td>
                            <td>
                                <textarea name="txtDiaChi" rows="3" cols="30"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <td>Điện thoại:</td>
                            <td><input type="tel" name="txtDienThoai" size="20"></td>
                        </tr>
                        <tr>
                            <td>Email:</td>
                            <td>
                                <input type="email" name="txtEmail" size="30" required>
                            </td>
                        </tr>
                    </table>
                </fieldset>

                <br>

                <fieldset>
                    <legend><b>Thông tin đăng nhập</b></legend>
                    
                    <table width="100%" border="0" cellspacing="0" cellpadding="8">
                        <tr>
                            <td width="150">Tên đăng nhập:</td>
                            <td><input type="text" name="txtTenDN" size="25" required></td>
                        </tr>
                        <tr>
                            <td>Mật khẩu:</td>
                            <td><input type="password" name="txtMatKhau" size="25" required></td>
                        </tr>
                        <tr>
                            <td>Nhập lại mật khẩu:</td>
                            <td><input type="password" name="txtMatKhauNL" size="25" required></td>
                        </tr>
                    </table>
                </fieldset>

                <br>

                <div align="center">
                    <input type="submit" value="Đăng ký"> &nbsp;&nbsp;
                    <input type="reset" value="Hủy">
                </div>

            </div>
        </form>

        <p><a href="Sanpham.html">Quay lại trang sản phẩm</a></p>
    </div>

</body>
</html>
