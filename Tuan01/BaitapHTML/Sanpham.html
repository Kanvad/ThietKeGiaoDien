<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Sản phẩm</title>
</head>
<!-- Sử dụng thuộc tính bgcolor để thiết lập màu nền (ví dụ: màu xám nhạt #f0f0f0 hoặc chọn màu tùy ý) -->
<body bgcolor="#BFDDF0">

    <!-- Tạo khối div với thuộc tính align="center" để canh giữa toàn bộ nội dung -->
    <div align="center">
        
        <!-- Mục tên sản phẩm: Size 6, in đậm, màu xanh, click vào sẽ liên kết đến Chitietsanpham.html -->
        <p>
            <a href="Chitietsanpham.html">
                <b><font size="6" color="blue">Giáo trình Tin học cơ bản</font></b>
            </a>
        </p>

        <!-- Chèn hình ảnh sách từ thư mục Images -->
        <p>
            <img src="Images/sach.jpg" alt="Giáo trình Tin học cơ bản" width="200">
        </p>

        <!-- Mục đơn giá: Chữ bình thường kết hợp giá tiền Size 5, màu đỏ -->
        <p>
            Đơn giá: <b><font size="5" color="red">26,000 VNĐ</font></b>
        </p>

        <!-- Chèn hình ảnh nút chọn mua từ thư mục Images -->
        <p>
            <a href="#">
                <img src="Images/nut_chon_mua.png" alt="Chọn mua" width="120">
            </a>
        </p>

    </div>

</body>
</html>
